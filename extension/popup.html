<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background: #0D0D12;
      color: #E6E6E6;
    }
    .header {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
      color: #5B5EFF;
    }
    .status {
      font-size: 13px;
      color: #9A9A9E;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: #1A1A1F;
      color: #5BFFA9;
    }
    .footer {
      font-size: 11px;
      border-top: 1px solid #1A1A1F;
      padding-top: 8px;
    }
    a { color: #5B5EFF; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">OrbitPost Automator</div>
  <div class="status">
    Status: <span class="badge">Active</span>
  </div>
  <p style="font-size: 12px; line-height: 1.4;">
    Enables automated posting on X / Twitter. Open the OrbitPost dashboard to start.
  </p>
  <div class="footer">
    Go to <a href="http://localhost:3000" target="_blank">Dashboard</a>
  </div>
</body>
</html>
